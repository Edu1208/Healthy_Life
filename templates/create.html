{% extends "base.html" %}
{% block title %}Nueva Rutina - HEALTHY LIFE{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header bg-success text-white">
    <h4 class="mb-0"><i class="fas fa-dumbbell me-2"></i>Crear Nueva Rutina</h4>
  </div>
  <div class="card-body">
    <form method="post" class="mt-3">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Nombre de la Rutina *</label>
          <input type="text" class="form-control" name="nombre" placeholder="Ej: Rutina de Fuerza" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Tipo de Ejercicio *</label>
          <select class="form-select" name="tipo" required>
            <option value="">Seleccionar tipo</option>
            <option value="Fuerza">Fuerza</option>
            <option value="Cardio">Cardio</option>
            <option value="Flexibilidad">Flexibilidad</option>
            <option value="HIIT">HIIT</option>
            <option value="Yoga">Yoga</option>
            <option value="Crossfit">Crossfit</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Duración *</label>
          <input type="text" class="form-control" name="duracion" placeholder="Ej: 45 minutos" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Frecuencia Semanal</label>
          <input type="text" class="form-control" name="frecuencia" placeholder="Ej: 3 veces por semana">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Nivel de Dificultad</label>
          <select class="form-select" name="nivel">
            <option value="">Seleccionar nivel</option>
            <option value="Principiante">Principiante</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Avanzado">Avanzado</option>
          </select>
        </div>
        <div class="col-12 mb-3">
          <label class="form-label fw-bold">Descripción</label>
          <textarea class="form-control" name="descripcion" rows="3" placeholder="Describe los ejercicios de la rutina..."></textarea>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save me-1"></i>Guardar Rutina
        </button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">
          <i class="fas fa-times me-1"></i>Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
