{% extends "base.html" %}
{% block title %}Editar Rutina - HEALTHY LIFE{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-header bg-warning text-dark">
    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Editar Rutina</h4>
  </div>
  <div class="card-body">
    <form method="post" class="mt-3">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Nombre de la Rutina *</label>
          <input type="text" class="form-control" name="nombre" value="{{ dato.nombre }}" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Tipo de Ejercicio *</label>
          <select class="form-select" name="tipo" required>
            <option value="Fuerza" {% if dato.tipo == 'Fuerza' %}selected{% endif %}>Fuerza</option>
            <option value="Cardio" {% if dato.tipo == 'Cardio' %}selected{% endif %}>Cardio</option>
            <option value="Flexibilidad" {% if dato.tipo == 'Flexibilidad' %}selected{% endif %}>Flexibilidad</option>
            <option value="HIIT" {% if dato.tipo == 'HIIT' %}selected{% endif %}>HIIT</option>
            <option value="Yoga" {% if dato.tipo == 'Yoga' %}selected{% endif %}>Yoga</option>
            <option value="Crossfit" {% if dato.tipo == 'Crossfit' %}selected{% endif %}>Crossfit</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Duración *</label>
          <input type="text" class="form-control" name="duracion" value="{{ dato.duracion }}" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Frecuencia Semanal</label>
          <input type="text" class="form-control" name="frecuencia" value="{{ dato.frecuencia }}">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Nivel de Dificultad</label>
          <select class="form-select" name="nivel">
            <option value="Principiante" {% if dato.nivel == 'Principiante' %}selected{% endif %}>Principiante</option>
            <option value="Intermedio" {% if dato.nivel == 'Intermedio' %}selected{% endif %}>Intermedio</option>
            <option value="Avanzado" {% if dato.nivel == 'Avanzado' %}selected{% endif %}>Avanzado</option>
          </select>
        </div>
        <div class="col-12 mb-3">
          <label class="form-label fw-bold">Descripción</label>
          <textarea class="form-control" name="descripcion" rows="3">{{ dato.descripcion }}</textarea>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning">
          <i class="fas fa-sync-alt me-1"></i>Actualizar Rutina
        </button>
        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">
          <i class="fas fa-times me-1"></i>Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
